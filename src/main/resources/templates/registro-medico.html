<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Médico - SAPA</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#ecf8f6;
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1400px;
            margin:auto;

            background:white;
            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,.08);

            display:grid;
            grid-template-columns:1fr 1fr;

            overflow:hidden;
        }

        .left{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px;
            background:#fafafa;
        }

        .left img{
            width:100%;
            max-width:450px;
        }

        .right{
            padding:50px;
        }

        .back{
            color:#02968c;
            text-decoration:none;
            font-weight:600;
        }

        h1{
            margin-top:15px;
            margin-bottom:10px;
            font-size:46px;
            color:#222;
        }

        .subtitle{
            color:#666;
            margin-bottom:30px;
        }

        .switch{
            display:flex;
            margin-bottom:30px;
            border:1px solid #ddd;
            border-radius:10px;
            overflow:hidden;
        }

        .switch a{
            flex:1;
            text-align:center;
            padding:15px;
            text-decoration:none;
            color:#333;
            background:white;
            font-weight:600;
        }

        .switch .active{
            background:#02968c;
            color:white;
        }

        h2{
            margin-bottom:20px;
            font-size:24px;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        .full{
            grid-column:1 / -1;
        }

        .group{
            display:flex;
            flex-direction:column;
        }

        .group label{
            margin-bottom:8px;
            font-weight:600;
        }

        .group input,
        .group textarea{
            padding:14px;
            border:1px solid #d9d9d9;
            border-radius:10px;
            font-size:14px;
        }

        .group textarea{
            min-height:140px;
            resize:vertical;
        }

        .group input:focus,
        .group textarea:focus{
            outline:none;
            border-color:#02968c;
        }

        .verification{
            margin-top:25px;
            background:#f5fffd;
            border:1px solid #c8ece8;
            border-radius:12px;
            padding:18px;
        }

        .verification h4{
            margin-bottom:8px;
            color:#02968c;
        }

        .verification p{
            color:#555;
            line-height:1.6;
        }

        .btn{
            width:100%;
            margin-top:25px;

            background:#02968c;
            color:white;

            border:none;
            border-radius:10px;

            padding:16px;

            font-size:16px;
            font-weight:600;

            cursor:pointer;
        }

        .btn:hover{
            background:#018278;
        }

        @media(max-width:1000px){

            .container{
                grid-template-columns:1fr;
            }

            .left{
                padding:30px;
            }

            .left img{
                max-width:250px;
            }

        }

        @media(max-width:768px){

            body{
                padding:15px;
            }

            .right{
                padding:25px;
            }

            h1{
                font-size:34px;
            }

            .grid{
                grid-template-columns:1fr;
            }

            .full{
                grid-column:auto;
            }

        }

    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <img src="img/logo.jpg" alt="Logo SAPA">
        </div>

        <div class="right">

            <a href="index.html" class="back">
                ← Volver al inicio
            </a>

            <h1>Crear Cuenta</h1>

            <p class="subtitle">
                Regístrate como profesional de la salud.
            </p>

            <div class="switch">
                <a href="registro-paciente.html">
                    Soy Paciente
                </a>

                <a href="#" class="active">
                    Soy Médico
                </a>
            </div>

            <h2>Información Profesional</h2>

            <form>

                <div class="grid">

                    <div class="group">
                        <label>Nombre</label>
                        <input type="text" placeholder="Ej: Juan">
                    </div>

                    <div class="group">
                        <label>Apellido</label>
                        <input type="text" placeholder="Ej: Pérez">
                    </div>

                    <div class="group">
                        <label>Matrícula Profesional</label>
                        <input type="text" placeholder="Ej: MP 123456">
                    </div>

                    <div class="group">
                        <label>Especialidad</label>
                        <input type="text" placeholder="Ej: Cardiología">
                    </div>

                    <div class="group">
                        <label>Hospital / Clínica</label>
                        <input type="text" placeholder="Ej: Hospital Interzonal">
                    </div>

                    <div class="group">
                        <label>Teléfono</label>
                        <input type="tel" placeholder="Ej: 2235123456">
                    </div>

                    <div class="group full">
                        <label>Correo electrónico</label>
                        <input type="email" placeholder="Ej: juan@hospital.com">
                    </div>

                    <div class="group full">
                        <label>Contraseña</label>
                        <input type="password" placeholder="Ingresa una contraseña">
                    </div>

                    <div class="group full">
                        <label>Biografía Profesional</label>

                        <textarea placeholder="Cuéntanos sobre tu experiencia profesional, formación académica y áreas de especialización."></textarea>
                    </div>

                </div>

                <div class="verification">

                    <h4>Verificación de identidad profesional</h4>

                    <p>
                        La información proporcionada será revisada antes
                        de habilitar tu cuenta médica dentro de la comunidad SAPA.
                    </p>

                </div>

                <button class="btn" type="submit">
                    Crear Cuenta como Médico
                </button>

            </form>

        </div>

    </div>

</body>
</html>
