<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAPA</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#ecf8f6;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .login-container{
            width:100%;
            max-width:1200px;

            background:white;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,.08);

            display:grid;
            grid-template-columns:1fr 1fr;

            overflow:hidden;
        }

        .left{
            display:flex;
            justify-content:center;
            align-items:center;

            padding:50px;
            background:#fafafa;
        }

        .left img{
            width:100%;
            max-width:420px;
        }

        .right{
            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .back-link{
            color:#02968c;
            text-decoration:none;
            font-weight:600;
            margin-bottom:20px;
        }

        h1{
            font-size:52px;
            color:#222;
            margin-bottom:10px;
        }

        .subtitle{
            color:#666;
            margin-bottom:35px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        .form-group input{
            width:100%;
            padding:14px;

            border:1px solid #d9d9d9;
            border-radius:10px;

            font-size:15px;
        }

        .form-group input:focus{
            outline:none;
            border-color:#02968c;
        }

        .btn-login{
            width:100%;

            border:none;

            background:#02968c;
            color:white;

            padding:15px;

            border-radius:10px;

            font-size:16px;
            font-weight:600;

            cursor:pointer;

            margin-top:10px;
        }

        .btn-login:hover{
            background:#018278;
        }

        .register{
            text-align:center;
            margin-top:25px;
            color:#666;
        }

        .register a{
            color:#02968c;
            text-decoration:none;
            font-weight:600;
        }

        #error{
            color:red;
            margin-bottom:10px;
            font-size:14px;
        }

        @media(max-width:900px){

            .login-container{
                grid-template-columns:1fr;
            }

            .left{
                padding:30px;
            }

            .left img{
                max-width:250px;
            }

            .right{
                padding:30px;
            }

            h1{
                font-size:38px;
            }

        }

        @media(max-width:500px){

            body{
                padding:15px;
            }

            h1{
                font-size:30px;
            }

            .right{
                padding:20px;
            }

        }

    </style>
</head>

<body>

<div class="login-container">

    <div class="left">
        <img src="/img/logo.jpg" alt="Logo SAPA">
    </div>

    <div class="right">

        <a href="/index.html" class="back-link">
            ← Volver al inicio
        </a>

        <h1>Iniciar Sesión</h1>

        <p class="subtitle">
            Accede a tu cuenta para participar en la comunidad SAPA.
        </p>

        <form id="loginForm">

            <div class="form-group">
                <label>Correo electrónico</label>

                <input
                        id="email"
                        type="email"
                        placeholder="Ej: juanperez@gmail.com"
                        required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>

                <input
                        id="password"
                        type="password"
                        placeholder="Ingresa tu contraseña"
                        required>
            </div>

            <p id="error"></p>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>

        </form>

        <div class="register">
            ¿No tienes una cuenta?

            <a href="/registro-paciente.html">
                Regístrate
            </a>
        </div>

    </div>

</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e){
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const error = document.getElementById("error");

        error.textContent = "";
        try {
            const response = await fetch("/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            if (!response.ok) {

                let mensaje = "Error al iniciar sesión";

                try {
                    const errorData = await response.json();
                    mensaje = errorData.message || mensaje;

                    if (mensaje === "Bad credentials") {
                        mensaje = "Correo o contraseña incorrectos";
                    }

                } catch {}

                error.textContent = mensaje;
                return;
            }

            const data = await response.json();

            console.log("LOGIN RESPONSE");
            console.log(data);

            localStorage.setItem("accessToken", data.AccessToken);
            localStorage.setItem("refreshToken", data.RefreshToken);

            console.log("TOKEN GUARDADO:");
            console.log(localStorage.getItem("accessToken"));

            // Redireccionar al inicio
            window.location.href =  "/index.html";

        }
        catch(err){

            console.error(err);

            error.textContent = "Error al conectar con el servidor";

        }

    });

</script>

</body>
</html>
