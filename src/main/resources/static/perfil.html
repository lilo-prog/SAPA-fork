<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SAPA</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/img/logo.jpg">
</head>

<body>

<header>

    <div class="logo-container">
        <img src="/img/logo.jpg" alt="Logo SAPA">
        <h1>SAPA</h1>
    </div>

    <nav>
        <a href="/index.html">
            <img src="/img/foro.png" alt="">
            Inicio
        </a>
        <a href="#">
            <img src="/img/foro.png" alt="">
            Foros
        </a>
        <a href="#">
            <img src="/img/guardado.png" alt="">
            Guardados
        </a>
        <a href="#">
            <img src="/img/lupa.png" alt="">
            Buscar
        </a>
    </nav>
</header>

<main style="max-width:900px; margin:auto; padding:40px; display:block;">
    <div class="card">
        <h2 style="color:#02968c; margin-bottom:25px;">Mi Perfil</h2>

        <p><strong>Nombre:</strong></p>
        <p id="firstName">Cargando...</p>

        <br>
        <p><strong>Apellido:</strong></p>
        <p id="lastName">Cargando...</p>

        <br>
        <p><strong>Email:</strong></p>
        <p id="email">Cargando...</p>

        <br>
        <p><strong>Rol:</strong></p>
        <p id="role">Cargando...</p>

        <div id="patientFields" style="display:none;">
            <br>
            <p><strong>Fecha de nacimiento:</strong></p>
            <p id="birthDate">-</p>

            <br>
            <p><strong>Teléfono:</strong></p>
            <p id="phoneNumber">-</p>

            <br>
            <p><strong>ID Historia Clínica:</strong></p>
            <p id="medicalRecordId">-</p>
        </div>

        <div id="doctorFields" style="display:none;">
            <br>
            <p><strong>Matrícula:</strong></p>
            <p id="licenseNumber">-</p>
        </div>
    </div>
</main>

<script>
    const token = localStorage.getItem("accessToken");

    if (!token) {
        alert("No hay sesión iniciada.");
        window.location.href = "/login.html";
    }

    fetch("/users/me", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
        .then(async response => {
            const text = await response.text();

            if (!response.ok) {
                throw new Error(text);
            }
            return JSON.parse(text);

        })
        .then(data => {
            document.getElementById("firstName").textContent =
                data.firstName || "No disponible";
            document.getElementById("lastName").textContent =
                data.lastName || "No disponible";
            document.getElementById("email").textContent =
                data.email || "No disponible";
            document.getElementById("role").textContent =
                data.role || "No disponible";
            if (data.role === "PATIENT") {
                document.getElementById("patientFields").style.display = "block";
                document.getElementById("birthDate").textContent =
                    data.birthDate || "No disponible";
                document.getElementById("phoneNumber").textContent =
                    data.phoneNumber || "No disponible";
                document.getElementById("medicalRecordId").textContent =
                    data.medicalRecordId || "Sin historia clínica";

            }
            if (data.role === "DOCTOR") {
                document.getElementById("doctorFields").style.display = "block";
                document.getElementById("licenseNumber").textContent =
                    data.licenseNumber || "No disponible";
            }

        })
        .catch(error => {

            console.error(error);

            alert("No se pudo cargar el perfil");

        });
</script>
</body>
</html>
