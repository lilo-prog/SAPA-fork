<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SAPA</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/img/logo.jpg">
</head>

<body>

<header>

    <div class="logo-container">
        <img src="/img/logo.jpg" alt="Logo SAPA">
        <h1>SAPA</h1>
    </div>

    <nav>
        <a href="/">
            <img src="/img/foro.png" alt="">
            Inicio
        </a>
        <a href="#">
            <img src="/img/foro.png" alt="">
            Foros
        </a>
        <a href="#">
            <img src="/img/guardado.png" alt="">
            Guardados
        </a>
        <a href="#">
            <img src="/img/lupa.png" alt="">
            Buscar
        </a>
    </nav>
</header>

<main style="max-width:900px; margin:auto; padding:40px; display:block;">

    <div class="card">
        <h2 style="color:#02968c; margin-bottom:25px;">Mi Perfil</h2>
        <p><strong>Nombre:</strong></p>
        <p id="firstName">Cargando...</p>

        <br>
        <p><strong>Apellido:</strong></p>
        <p id="lastName">Cargando...</p>

        <br>
        <p><strong>Email:</strong></p>
        <p id="email">Cargando...</p>

        <br>
        <p><strong>Rol:</strong></p>
        <p id="role">Cargando...</p>
    </div>
</main>

<script>
    const token = localStorage.getItem("accessToken");
    if (!token) {
        alert("No hay sesión iniciada.");
        window.location.href = "/login";
    }
    fetch("/users/me", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(async response => {
        const text = await response.text();

        if (!response.ok) {
            throw new Error(text);
        }

        return JSON.parse(text);
    })
    .then(data => {
        document.getElementById("firstName").textContent = data.firstName || "No disponible";
        document.getElementById("lastName").textContent = data.lastName || "No disponible";
        document.getElementById("email").textContent = data.email || "No disponible";
        document.getElementById("role").textContent = data.role || "No disponible";
    })
    .catch(error => {
        console.error(error);

        alert("No se pudo cargar el perfil.");

        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");

        window.location.href = "/login";
    });
</script>
</body>
</html>
